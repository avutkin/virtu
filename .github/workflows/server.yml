name: Server Deploy

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'metrics.py'
      - 'requirements.txt'

jobs:
  # ── Server tests ─────────────────────────────────────────────────────────────
  test:
    name: Python tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       wythin_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r server/requirements.txt
          pip install pytest pytest-asyncio httpx asgi-lifespan

      - name: Run server tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wythin_test
        run: pytest server/tests/ -v

  # ── Deploy to Hetzner (main branch only) ─────────────────────────────────────
  # Requires repo secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, API_DOMAIN
  # (see server/deploy/README.md). The box is provisioned by hetzner-setup.sh.
  deploy:
    name: Deploy → Hetzner
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'ENDSSH'
            set -e
            cd /opt/wythin

            # Pull latest code
            git pull origin main

            # Update Python dependencies (API only)
            .venv/bin/pip install -r server/requirements.txt -q

            # Apply idempotent schema migrations with the box's env loaded
            set -a && . server/deploy/.env && set +a
            .venv/bin/python server/deploy/migrate.py

            # Restart the API service (needs a NOPASSWD sudoers entry, see README)
            sudo systemctl restart wythin-api
            echo "Deploy complete"
          ENDSSH

      - name: Health check
        run: |
          sleep 5
          curl --fail "https://${{ secrets.API_DOMAIN }}/health" || exit 1
